name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build embedded Baritone component
        working-directory: vendor/baritone
        run: bash ./gradlew :fabric:remapJar --console=plain

      - name: Run checks and package release bundle
        run: ./gradlew check releaseBundle

      - name: Upload mod artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helikon
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            build/releases/*.zip
            build/reports/helikon/*
          if-no-files-found: error

  client-gametest:
    runs-on: ubuntu-latest
    # Runs a real 26.2 client under a virtual display. Marked non-blocking
    # until software-GL support on hosted runners is proven; flip to false
    # after the first green run.
    continue-on-error: true
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build embedded Baritone component
        working-directory: vendor/baritone
        run: bash ./gradlew :fabric:remapJar --console=plain

      - name: Run client gametests under a virtual display
        run: xvfb-run -a ./gradlew runClientGameTest

      - name: Upload gametest screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-gametest-screenshots
          path: build/run/clientGameTest/screenshots/*.png
          if-no-files-found: ignore
