name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run checks and package release bundle
        run: ./gradlew check releaseBundle

      - name: Publish GitHub release from the tag
        uses: softprops/action-gh-release@v2
        with:
          name: Helikon ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/libs/helikon-*.jar
            build/releases/*.zip
            build/reports/helikon/checksums.sha256
            build/reports/helikon/dependencies.txt
